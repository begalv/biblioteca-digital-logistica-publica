services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nourau}
      POSTGRES_USER: ${POSTGRES_USER:-php}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abc123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-php} -d ${POSTGRES_DB:-nourau}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nourau:
    build:
      context: ./nourau
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nourau}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-php}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abc123}
      NOURAU_SITE_URL: ${NOURAU_SITE_URL:-http://localhost:8080}
      NOURAU_WEBMASTER_EMAIL: ${NOURAU_WEBMASTER_EMAIL:-nourau@localhost}
      PORTAL_URL: ${PORTAL_URL:-http://localhost:8000}
    volumes:
      - nourau_data:/nourau
    ports:
      - "${NOURAU_PORT:-8080}:80"
    depends_on:
      postgres:
        condition: service_healthy

  portal:
    build:
      context: ..
      dockerfile: docker/portal/Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-nourau}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      PORTAL_DB_USER: ${PORTAL_DB_USER:-portal_reader}
      PORTAL_DB_PASSWORD: ${PORTAL_DB_PASSWORD:-portal_reader_dev}
      POSTGRES_USER: ${POSTGRES_USER:-php}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abc123}
      NOURAU_SITE_URL: ${NOURAU_SITE_URL:-http://localhost:8080}
      NOURAU_ARCHIVE_DIR: /nourau/archive
    volumes:
      - nourau_data:/nourau:ro
    ports:
      - "${PORTAL_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  nourau_data:
